import os
import requests
import yfinance as yf
from datetime import datetime
import time

def hantar_ke_telegram():
    TOKEN = os.getenv('TELEGRAM_TOKEN')
    CHAT_ID = '5217743374'
    
    with open('senarai.txt', 'r') as f:
        senarai_saham = [line.strip() for line in f.readlines()]
    
    # Pecahkan kepada 10 saham setiap mesej
    for i in range(0, len(senarai_saham), 10):
        chunk = senarai_saham[i:i+10]
        laporan = f"<b>LAPORAN SAHAM - {datetime.now().strftime('%d/%m/%y')}</b>\n\n"
        
        for s in chunk:
            try:
                ticker = yf.Ticker(s)
                info = ticker.info
                harga = info.get('currentPrice', 'N/A')
                pe = info.get('trailingPE', 'N/A')
                cap = info.get('marketCap', 0) / 1e9
                
                laporan += f"<b>{s}</b> | ${harga} | PE: {pe} | Cap: ${cap:.1f}B\n"
            except:
                laporan += f"<b>{s}</b> | Error\n"
        
        laporan += "\n--------------------"
        
        requests.post(f"https://api.telegram.org/bot{TOKEN}/sendMessage", 
                      data={'chat_id': CHAT_ID, 'text': laporan, 'parse_mode': 'HTML'})
        
        # Delay 2 saat setiap mesej supaya Telegram tak block (Rate Limit)
        time.sleep(2)

if name == "__main__":
    hantar_ke_telegram()
